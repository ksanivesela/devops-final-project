version: "3.9"

services:

  database:
    image: postgres:16

    environment:
      POSTGRES_DB: devopsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - devops

    deploy:
      restart_policy:
        condition: any

  backend:

    image: ghcr.io/ksanivesela/devops-final-project-backend:latest

    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: devopsdb
      DB_USER: postgres
      DB_PASSWORD: postgres

    networks:
      - devops

    deploy:
      replicas: 1
      restart_policy:
        condition: any

  frontend:

    image: ghcr.io/ksanivesela/devops-final-project-frontend:latest

    ports:
      - "80:80"

    networks:
      - devops

    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:

    postgres_data:

networks:

    devops: