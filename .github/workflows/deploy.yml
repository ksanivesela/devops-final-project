name: Deploy VPS

on:

  push:

    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Login GHCR

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GHCR_PAT }}

      - name: Build Backend

        uses: docker/build-push-action@v6

        with:

          context: ./backend

          push: true

          tags: ghcr.io/ksanivesela/devops-final-project-backend:latest

      - name: Build Frontend

        uses: docker/build-push-action@v6

        with:

          context: ./frontend

          push: true

          tags: ghcr.io/ksanivesela/devops-final-project-frontend:latest

      - name: Copy Stack

        uses: appleboy/scp-action@v0.1.7

        with:

          host: ${{ secrets.VPS_HOST }}

          username: ${{ secrets.VPS_USER }}

          key: ${{ secrets.VPS_SSH_KEY }}

          source: "stack.yml"

          target: "/home/smith/devops-final-project"

      - name: Deploy VPS

        uses: appleboy/ssh-action@v1.2.0

        with:

          host: ${{ secrets.VPS_HOST }}

          username: ${{ secrets.VPS_USER }}

          key: ${{ secrets.VPS_SSH_KEY }}

          script: |

            cd /home/smith/devops-final-project

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ksanivesela --password-stdin

            docker pull ghcr.io/ksanivesela/devops-final-project-backend:latest

            docker pull ghcr.io/ksanivesela/devops-final-project-frontend:latest

            docker stack deploy -c stack.yml devops

            docker service ls