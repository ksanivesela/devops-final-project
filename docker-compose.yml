version: "3.9"

services:

  database:

    image: postgres:16

    container_name: postgres-db

    restart: always

    environment:

      POSTGRES_DB: devopsdb

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    volumes:

      - postgres_data:/var/lib/postgresql/data

      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    ports:

      - "5432:5432"

    networks:

      - devops-network

  backend:

    build: ./backend

    container_name: flask-api

    restart: always

    depends_on:

      - database

    environment:

      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: devopsdb
      DB_USER: postgres
      DB_PASSWORD: postgres

    ports:

      - "5000:5000"

    networks:

      - devops-network

  frontend:

    build: ./frontend

    container_name: frontend-nginx

    restart: always

    depends_on:

      - backend

    ports:

      - "80:80"

    networks:

      - devops-network

volumes:

  postgres_data:

networks:

  devops-network: